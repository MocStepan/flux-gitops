---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn-repository
  namespace: flux-system
spec:
  interval: 1m
  url: https://charts.longhorn.io

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 15m
  timeout: 5m
  releaseName: longhorn
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn-repository
        namespace: flux-system
  values:
    defaultClassreplicaCount: 2
    preUpgradeChecker:
      jobEnabled: false
    csi:
      attacherReplicaCount: 1
      provisonerReplicaCount: 1
      resizerReplicaCount: 1
      snapshotterReplicaCount: 1
    longhornUI:
      replicas: 1
    ingress:
      enabled: true
      ingressClassName: traefik
      host: longhorn-dashboard.moc.actis.cz
      # TODO: Add cert-manager to the cluster
      # tls: true
      # tlsSecretName: longhorn-dashboard-tls
