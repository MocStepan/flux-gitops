---
apiVersion: v1
kind: Namespace
metadata:
  name: vault-system

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vault-repository
  namespace: flux-system
spec:
  interval: 1m
  url: https://helm.releases.hashicorp.com

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault-system
spec:
  interval: 60m
  timeout: 5m
  releaseName: vault
  chart:
    spec:
      chart: vault
      version: 0.32.0
      sourceRef:
        name: vault-repository
        kind: HelmRepository
        namespace: flux-system
  values:
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: vault.moc.actis.cz
          paths: []
      # TODO: After cert-manager is added
      # tls:
      #   - secretName: vault-system-tls
      #     hosts:
      #       - vault.moc.actis.cz
    dataStorage:
      size: 2Gi
      storageClass: longhorn
    ui:
      enabled: true
