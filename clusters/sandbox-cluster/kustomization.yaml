---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastracture-controllers
  namespace: flux-system
spec:
  interval: 60m0s
  retryInterval: 2m0s
  timeout: 5m0s
  force: false
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers
